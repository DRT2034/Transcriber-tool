<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Lecture Transcriber</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 2rem; }
      .card { max-width: 560px; padding: 1.5rem; border: 1px solid #ddd; border-radius: 12px; }
      button { padding: .6rem 1rem; border-radius: 8px; border: 1px solid #ccc; background: #f7f7f7; cursor: pointer; }
      input[type=file] { margin: 1rem 0; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Upload a lecture to transcribe</h2>
      <form method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept="audio/*,video/*" required />
        <div>
          <button type="submit">Transcribe to PDF</button>
        </div>
      </form>
      <p style="margin-top:1rem;color:#666">
        Accepted: mp3, wav, m4a, flac, ogg, mp4, mov, mkv, aac
      </p>
    </div>
  </body>
</html>
